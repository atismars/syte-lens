<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syte.Lens</title>
    <style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('../fonts/Inter.woff2') format('woff2');unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;}
@font-face{font-family:'Space Grotesk';font-style:normal;font-weight:300 700;font-display:swap;src:url('../fonts/SpaceGrotesk.woff2') format('woff2');unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;}
    </style>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #DFE9F8; }
      #root { height: 100%; }
      button { font: inherit; }
      a, button { transition: background-color .15s ease, color .15s ease, opacity .15s ease; }
      /* Keyboard focus — visible ring (skill §1 focus-states, High) */
      :focus-visible { outline: 2px solid #2563EB; outline-offset: 2px; border-radius: 4px; }
      /* Hover on a section header → 15% darker than the #DFE9F8 background */
      .syte-section-toggle:hover { background: #BEC6D3 !important; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.45); border-radius: 2px; }
      /* Respect motion preferences (skill §7 reduced-motion, High) */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Built from index.jsx by esbuild (npm run build). -->
    <script type="module" src="index.js"></script>
  </body>
</html>
